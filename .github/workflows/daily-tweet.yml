name: Daily Tweet

on:
  schedule:
    - cron: '0 15 * * *' # 10 AM EST / 11 AM EDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout blog
        uses: actions/checkout@v4
        with:
          repository: caden311/blog
          path: blog
          token: ${{ secrets.BLOG_READ_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Generate and post tweet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          BLOG_DIR: ${{ github.workspace }}/blog/src/content/blog
        run: node dist/index.js

      - name: Commit updated tweet history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tweet-history.json
          git diff --staged --quiet || git commit -m "Post daily tweet - $(date -u +%Y-%m-%d)"
          git push
